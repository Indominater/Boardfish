[package]
name = "canvas-app"
version = "0.1.0"
description = "Canvas App"
authors = []
license = ""
repository = ""
default-run = "canvas-app"
edition = "2021"
rust-version = "1.60"

[build-dependencies]
tauri-build = { version = "1.5", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
tauri = { version = "1.7", features = [ "process-exit", "window-close", "fs-write-file", "fs-read-file", "dialog-save", "dialog-open", "shell-open"] }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
