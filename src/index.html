<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boardfish</title>
  <style>
    @font-face {
      font-family: 'Geist';
      font-style: normal;
      font-weight: 300 700;
      font-display: swap;
      src: url('fonts/Geist.woff2') format('woff2');
    }
  </style>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #1c1c1e;
      user-select: none;
      font-family: 'Geist', 'Geist Sans', Inter, -apple-system, 'Segoe UI', system-ui, sans-serif;
    }

    #canvas {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      contain: paint;
    }

    #canvas-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      display: block;
    }

    #canvas.panning    { cursor: grabbing !important; }
    #canvas.panning    * { cursor: grabbing !important; }

    #world {
      position: absolute;
      top: 0; left: 0;
      z-index: 1;
      transform-origin: 0 0;
    }

    .obj { position: absolute; cursor: default; }

    .obj-inner { width: 100%; height: 100%; overflow: hidden; }

    .obj-text .obj-inner pre {
      width: 100%;
      height: 100%;
      font-family: inherit;
      font-size: 16px;
      white-space: pre-wrap;
      word-break: break-word;
      padding: 4px;
      background: transparent;
      border: none;
      outline: none;
      overflow: hidden;
      cursor: default;
      color: #ffffff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .obj-text.editing .obj-inner pre { cursor: text; }
    .obj-text.caret-hidden .obj-inner pre { caret-color: transparent; }

    .obj-image .obj-inner img {
      width: 100%;
      height: 100%;
      object-fit: fill;
      display: block;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* ── Selection overlay ── */
    #sel-overlay {
      position: absolute;
      display: none;
      border: 1px solid rgba(10, 132, 255, 0.9);
      pointer-events: none;
      z-index: 99998;
    }
    #sel-overlay.visible { display: block; }
    .s-handle {
      position: absolute;
      width: 7px;
      height: 7px;
      background: #fff;
      border-radius: 1px;
      pointer-events: all;
    }
    .s-handle[data-dir="nw"] { top: -4px;    left: -4px;   cursor: nw-resize; }
    .s-handle[data-dir="ne"] { top: -4px;    right: -4px;  cursor: ne-resize; }
    .s-handle[data-dir="sw"] { bottom: -4px; left: -4px;   cursor: sw-resize; }
    .s-handle[data-dir="se"] { bottom: -4px; right: -4px;  cursor: se-resize; }

    /* ── Context menu — Liquid Glass ── */
    #ctx-menu {
      position: fixed;
      background: rgba(26, 26, 28, 0.72);
      backdrop-filter: blur(48px) saturate(200%);
      -webkit-backdrop-filter: blur(48px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      box-shadow:
        0 24px 64px rgba(0,0,0,0.6),
        0 4px 16px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.1);
      z-index: 99999;
      min-width: 220px;
      padding: 5px;
      display: none;
      overflow: hidden;
    }
    #ctx-menu.visible { display: block; }

    #obj-ctx-menu {
      position: fixed;
      background: rgba(26, 26, 28, 0.72);
      backdrop-filter: blur(48px) saturate(200%);
      -webkit-backdrop-filter: blur(48px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      box-shadow:
        0 24px 64px rgba(0,0,0,0.6),
        0 4px 16px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.1);
      z-index: 99999;
      min-width: 160px;
      padding: 5px;
      display: none;
      overflow: hidden;
    }
    #obj-ctx-menu.visible { display: block; }

    .ctx-item {
      display: block;
      width: 100%;
      padding: 4px 10px;
      font-family: inherit;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.88);
      background: transparent;
      border: none;
      border-radius: 7px;
      text-align: left;
      cursor: default;
      letter-spacing: -0.01em;
      -webkit-font-smoothing: antialiased;
      transition: background 0.08s;
    }
    .ctx-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .ctx-item:active { background: rgba(255,255,255,0.15); }

    .ctx-sep {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 3px 5px;
    }

    /* ── Island ── */
    #island {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(26, 26, 28, 0.72);
      backdrop-filter: blur(48px) saturate(200%);
      -webkit-backdrop-filter: blur(48px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      box-shadow:
        0 24px 64px rgba(0,0,0,0.6),
        0 4px 16px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.1);
      padding: 5px;
      display: flex;
      align-items: center;
      z-index: 9000;
      overflow: hidden;
    }

    .isl-sep {
      width: 1px;
      height: 14px;
      background: rgba(255,255,255,0.08);
      margin: 0 3px;
      flex-shrink: 0;
    }

    #isl-zoom {
      padding: 4px 8px;
      font-family: inherit;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.38);
      letter-spacing: -0.01em;
      -webkit-font-smoothing: antialiased;
      white-space: nowrap;
      min-width: 44px;
      text-align: center;
      font-variant-numeric: tabular-nums;
      transition: color 0.5s ease;
    }



    /* ── Unsaved changes dialog ── */
    #dialog-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.36);
      backdrop-filter: blur(12px) saturate(150%);
      -webkit-backdrop-filter: blur(12px) saturate(150%);
      z-index: 9999999;
      align-items: center;
      justify-content: center;
    }
    #dialog-overlay.show { display: flex; }

    #dialog {
      background: rgba(26, 26, 28, 0.72);
      backdrop-filter: blur(48px) saturate(200%);
      -webkit-backdrop-filter: blur(48px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      box-shadow:
        0 24px 64px rgba(0,0,0,0.6),
        0 4px 16px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.1);
      width: 260px;
      padding: 5px;
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow: hidden;
    }

    #dialog-body {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 6px 10px 8px;
    }

    #dialog-title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.95);
      letter-spacing: -0.02em;
      line-height: 1.3;
      -webkit-font-smoothing: antialiased;
    }

    #dialog-msg {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      line-height: 1.4;
      letter-spacing: -0.01em;
      -webkit-font-smoothing: antialiased;
    }

    #dialog-btns {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 5px;
    }

    #dlg-right {
      display: flex;
      gap: 6px;
    }

    #dialog-btns button {
      padding: 4px 10px;
      border-radius: 7px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.01em;
      cursor: default;
      -webkit-font-smoothing: antialiased;
      transition: background 0.08s, opacity 0.1s;
      border: none;
    }

    #dlg-discard {
      background: rgba(255, 59, 48, 0.22);
      border: 1px solid rgba(255, 59, 48, 0.3);
      color: #FF453A;
    }
    #dlg-discard:hover { background: rgba(255, 59, 48, 0.32); }
    #dlg-discard:active { opacity: 0.82; }

    #dlg-cancel {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.88);
      font-weight: 400;
    }
    #dlg-cancel:hover { background: rgba(255,255,255,0.16); }

    #dlg-save {
      background: #0A84FF;
      border: 1px solid rgba(255,255,255,0.15);
      color: #ffffff;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
    }
    #dlg-save:hover { background: #409CFF; }
    #dlg-save:active { opacity: 0.85; }

  </style>
</head>
<body>
  <div id="canvas">
    <canvas id="canvas-bg"></canvas>
    <div id="world"></div>
    <div id="sel-overlay">
      <div class="s-handle" data-dir="nw"></div>
      <div class="s-handle" data-dir="ne"></div>
      <div class="s-handle" data-dir="sw"></div>
      <div class="s-handle" data-dir="se"></div>
    </div>
  </div>

  <div id="ctx-menu">
    <button class="ctx-item" id="btn-new">New Board</button>
    <div class="ctx-sep"></div>
    <button class="ctx-item" id="btn-add-text">Add Text</button>
    <button class="ctx-item" id="btn-add-image">Add Image</button>
    <div class="ctx-sep"></div>
    <button class="ctx-item" id="btn-save">Save</button>
    <button class="ctx-item" id="btn-save-as">Save As</button>
    <button class="ctx-item" id="btn-open">Open</button>
  </div>

  <div id="obj-ctx-menu">
    <button class="ctx-item" id="obj-btn-copy">Copy</button>
    <button class="ctx-item" id="obj-btn-duplicate">Duplicate</button>
    <div class="ctx-sep"></div>
    <button class="ctx-item" id="obj-btn-delete">Delete</button>
  </div>

  <input type="file" id="file-input" accept="image/*" style="display:none" />

  <div id="dialog-overlay">
    <div id="dialog">
      <div id="dialog-body">
        <div id="dialog-title">Unsaved Changes</div>
        <div id="dialog-msg">This board has unsaved changes.</div>
      </div>
      <div class="ctx-sep"></div>
      <div id="dialog-btns">
        <button id="dlg-discard">Delete</button>
        <div id="dlg-right">
          <button id="dlg-cancel">Cancel</button>
          <button id="dlg-save">Save</button>
        </div>
      </div>
    </div>
  </div>


  <div id="island">
    <span id="isl-zoom">100%</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
